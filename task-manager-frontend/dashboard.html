<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-body">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-name">TaskFlow Pro</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="#">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="#" id="newTaskNav">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        New Task
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="userAvatar">M</div>
        <div>
          <p class="user-name" id="userBadge">Member</p>
          <p class="user-role">Personal workspace</p>
        </div>
      </div>
      <button id="logoutBtn" class="logout-btn" type="button" title="Logout">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <div class="app-main">

    <header class="app-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-sub">Manage and track all your tasks</p>
      </div>
      <button class="btn-primary" id="openFormBtn" type="button">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Task
      </button>
    </header>

    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-icon stat-icon--blue">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div>
          <p class="stat-label">Total Tasks</p>
          <p class="stat-value" id="totalTasks">0</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon--green">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div>
          <p class="stat-label">Completed</p>
          <p class="stat-value" id="completedTasks">0</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon--amber">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div>
          <p class="stat-label">Pending</p>
          <p class="stat-value" id="pendingTasks">0</p>
        </div>
      </div>
      <div class="stat-card stat-card--accent">
        <div class="stat-icon stat-icon--white">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <div>
          <p class="stat-label">Completion</p>
          <p class="stat-value" id="completionBadge">0%</p>
        </div>
      </div>
    </section>

    <section class="tasks-section">
      <div class="tasks-header">
        <h2 class="section-title">All Tasks</h2>
        <button id="refreshBtn" class="btn-ghost" type="button">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
      </div>
      <p id="taskMessage" class="message"></p>
      <div id="taskList" class="task-table-wrap">
        <div class="empty-state">
          <svg width="40" height="40" fill="none" stroke="#94a3b8" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <p>No tasks yet. Click "Add Task" to get started.</p>
        </div>
      </div>
    </section>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="taskDrawer">
    <div class="drawer-header">
      <h2 id="drawerTitle">New Task</h2>
      <button class="drawer-close" id="drawerClose" type="button" aria-label="Close">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="taskForm" class="drawer-form">
      <label class="field-label">
        Title
        <input type="text" name="title" placeholder="e.g. Design landing page" required />
      </label>
      <label class="field-label">
        Description
        <textarea name="description" placeholder="Add details, links, or notes..."></textarea>
      </label>
      <div class="field-row">
        <label class="field-label">
          Priority
          <select name="priority" required>
            <option value="">Select</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </label>
        <label class="field-label">
          Status
          <select name="status" required>
            <option value="">Select</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </label>
      </div>
      <div class="drawer-actions">
        <button id="saveTaskBtn" class="btn-primary" type="submit">Save Task</button>
        <button id="cancelEditBtn" class="btn-ghost-dark hidden" type="button">Cancel edit</button>
      </div>
    </form>
  </aside>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="common.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
